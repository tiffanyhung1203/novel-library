<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的小說庫</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
header { background:#333; color:white; padding:10px; text-align:center; }
.container { padding:10px; max-width:900px; margin:auto; }

input, select, textarea {
  width:100%; padding:8px; margin:5px 0;
}

.card {
  background:white; padding:10px; margin:10px 0; border-radius:8px;
}

button { padding:8px; margin-top:5px; }

.small { font-size:12px; color:#666; }

.tag {
  font-size:12px; background:#ddd; padding:2px 6px; border-radius:5px; margin-right:5px;
}

#userArea {
  position: absolute;
  top:10px;
  right:10px;
  color:white;
}
</style>
</head>

<body>

<header>
📚 我的小說庫
</header>

<div id="userArea"></div>

<div class="container">

<button onclick="login()">🔐 Google 登入</button>
<button onclick="logout()">登出</button>

<h3>新增小說</h3>

<input id="title" placeholder="書名">
<input id="author" placeholder="作者">
<input id="tags" placeholder="標籤">

<select id="status">
  <option>閱讀中</option>
  <option>已完結</option>
  <option>棄坑</option>
  <option>想看</option>
</select>

<input id="rating" placeholder="評分">
<textarea id="note" placeholder="心得"></textarea>

<button onclick="addBook()">新增</button>

<div id="list"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1-LEHAu6u3_hZI3ITetepkM_ylaOG4wo",
  authDomain: "novel-library-39143.firebaseapp.com",
  projectId: "novel-library-39143",
  storageBucket: "novel-library-39143.firebasestorage.app",
  messagingSenderId: "957574965767",
  appId: "1:957574965767:web:30dd338809676e088b18a2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let books = [];
let currentUser = null;

function login(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function logout(){
  auth.signOut();
}

auth.onAuthStateChanged(user => {
  currentUser = user;

  if(user){
    document.getElementById("userArea").innerText = user.displayName;
    loadBooks();
  } else {
    document.getElementById("userArea").innerText = "";
    books = [];
    render();
  }
});

async function loadBooks(){
  const snap = await db.collection("books")
    .where("uid","==",currentUser.uid)
    .get();

  books = snap.docs.map(d => d.data());
  render();
}

async function addBook(){

  const book = {
    id: Date.now(),
    uid: currentUser.uid,
    title: title.value || "",
    author: author.value || "",
    tags: tags.value || "",
    status: status.value || "閱讀中",
    rating: rating.value || "",
    note: note.value || ""
  };

  await db.collection("books").doc(String(book.id)).set(book);

  loadBooks();
}

function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  books.forEach(b => {
    list.innerHTML += `
      <div class="card">
        <b>${b.title}</b><br>
        ${b.author}<br>
        ${b.status}<br>
        <button onclick="del(${b.id})">刪除</button>
      </div>
    `;
  });
}

async function del(id){
  await db.collection("books").doc(String(id)).delete();
  loadBooks();
}
</script>

</body>
</html>
