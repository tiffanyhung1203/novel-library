<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的小說庫</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
header { background:#333; color:white; padding:10px; text-align:center; }
.container { padding:10px; max-width:900px; margin:auto; }

input, select, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
}

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

button {
  padding:6px;
  margin-top:5px;
}

#userArea {
  position:absolute;
  top:10px;
  right:10px;
  color:white;
  font-size:12px;
}
</style>
</head>

<body>

<header>📚 我的小說庫</header>
<div id="userArea"></div>

<div class="container">

<button onclick="login()">Google 登入</button>
<button onclick="logout()">登出</button>

<h3>新增小說</h3>

<input id="title" placeholder="書名">
<input id="author" placeholder="作者">
<input id="tags" placeholder="標籤">

<select id="userStatus">
  <option value="want">待看</option>
  <option value="reading">看一半</option>
  <option value="done">看完</option>
  <option value="dropped">棄坑</option>
</select>

<select id="bookStatus">
  <option value="ongoing">未完結</option>
  <option value="finished">已完結</option>
</select>

<input id="rating" placeholder="評分">
<textarea id="note" placeholder="心得"></textarea>

<button onclick="addBook()">新增</button>

<div id="list"></div>

</div>

<!-- Firebase compat（重點：不要用 modular） -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
/* ================= Firebase 初始化 ================= */
const firebaseConfig = {
  apiKey: "AIzaSyC1-LEHAu6u3hZI3ITetepkM_ylaOG4wo",
  authDomain: "novel-library-39143.firebaseapp.com",
  projectId: "novel-library-39143",
  storageBucket: "novel-library-39143.appspot.com",
  messagingSenderId: "957574965767",
  appId: "1:957574965767:web:30dd338809676e088b18a2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* ================= 全域狀態 ================= */
let books = [];
let currentUser = null;

/* ================= 中文狀態顯示 ================= */
const statusMap = {
  want: "待看",
  reading: "看一半",
  done: "看完",
  dropped: "棄坑",
  ongoing: "未完結",
  finished: "已完結"
};

/* ================= 登入 ================= */
function login(){
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

function logout(){
  auth.signOut();
}

/* ================= 登入狀態監聽 ================= */
auth.onAuthStateChanged(user => {
  currentUser = user;

  if(user){
    document.getElementById("userArea").innerText = user.displayName;
    loadBooks();
  } else {
    document.getElementById("userArea").innerText = "";
    books = [];
    render();
  }
});

/* ================= 讀取資料 ================= */
async function loadBooks(){
  if(!currentUser) return;

  const snap = await db.collection("books")
    .where("uid","==",currentUser.uid)
    .get();

  books = snap.docs.map(d => d.data());
  render();
}

/* ================= 新增 ================= */
async function addBook(){

  if(!currentUser){
    alert("請先登入 Google");
    return;
  }

  const book = {
    id: Date.now(),
    uid: currentUser.uid,

    title: document.getElementById("title").value || "",
    author: document.getElementById("author").value || "",
    tags: document.getElementById("tags").value || "",

    userStatus: document.getElementById("userStatus").value || "want",
    bookStatus: document.getElementById("bookStatus").value || "ongoing",

    rating: document.getElementById("rating").value || "",
    note: document.getElementById("note").value || ""
  };

  await db.collection("books").doc(String(book.id)).set(book);

  loadBooks();
}

/* ================= 刪除 ================= */
async function del(id){
  await db.collection("books").doc(String(id)).delete();
  loadBooks();
}

/* ================= 畫面渲染 ================= */
function render(){
  const list = document.getElementById("list");
  list.innerHTML = "";

  books.forEach(b => {

    list.innerHTML += `
      <div class="card">

        <b>${b.title}</b> ｜ ${b.author}<br>

        ${statusMap[b.userStatus]} ｜ ${statusMap[b.bookStatus]} ｜ ⭐ ${b.rating || "-"}

        <br>
        <button onclick="del(${b.id})">刪除</button>

      </div>
    `;
  });
}
</script>

</body>
</html>
