<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>我的小說庫</title>

<style>
body { font-family: sans-serif; margin:0; background:#f5f5f5; }
header { background:#333; color:#fff; padding:10px; text-align:center; }
.container { max-width:900px; margin:auto; padding:10px; }

input, select, textarea {
  width:100%; padding:8px; margin:5px 0;
}

button { padding:8px; margin:5px 0; cursor:pointer; }

.card {
  background:#fff; padding:10px; margin:10px 0; border-radius:8px;
}

.tag {
  font-size:12px; background:#ddd; padding:2px 6px; border-radius:5px; margin-right:5px;
}

.small { font-size:12px; color:#666; }

#loginBtn { background:#4285F4; color:white; border:none; }
#logoutBtn { background:#999; color:white; border:none; }
</style>
</head>

<body>

<header>
📚 我的小說庫
<div id="userArea"></div>
</header>

<div class="container">

<button id="loginBtn" onclick="login()">🔐 Google 登入</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">登出</button>

<hr/>

<h3>新增小說</h3>

<input id="title" placeholder="書名">
<input id="author" placeholder="作者">
<input id="tags" placeholder="標籤（逗號分隔）">

<select id="status">
  <option>閱讀中</option>
  <option>已完結</option>
  <option>棄坑</option>
  <option>想看</option>
</select>

<input id="rating" type="number" placeholder="評分(1-10)">
<textarea id="note" placeholder="心得"></textarea>

<button onclick="addBook()">新增</button>

<hr/>

<input id="search" placeholder="搜尋小說..." oninput="render()"/>

<div id="list"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC1-LEHAu6u3_hZI3ITetepkM_ylaOG4wo",
  authDomain: "novel-library-39143.firebaseapp.com",
  projectId: "novel-library-39143",
  storageBucket: "novel-library-39143.firebasestorage.app",
  messagingSenderId: "957574965767",
  appId: "1:957574965767:web:30dd338809676e088b18a2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let books = [];
let currentUser = null;

/* ---------- 登入 ---------- */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){
  auth.signOut();
}

/* ---------- 狀態監聽 ---------- */
auth.onAuthStateChanged(user => {
  currentUser = user;

  if(user){
    document.getElementById("loginBtn").style.display = "none";
    document.getElementById("logoutBtn").style.display = "block";
    document.getElementById("userArea").innerText = "👤 " + user.displayName;
    loadBooks();
  } else {
    document.getElementById("loginBtn").style.display = "block";
    document.getElementById("logoutBtn").style.display = "none";
    document.getElementById("userArea").innerText = "";
    books = [];
    render();
  }
});

/* ---------- 讀資料 ---------- */
async function loadBooks(){
  if(!currentUser) return;

  const snapshot = await db.collection("books")
    .where("uid","==",currentUser.uid)
    .get();

  books = snapshot.docs.map(doc => doc.data());
  render();
}

/* ---------- 新增 ---------- */
async function addBook(){
  if(!currentUser) return alert("請先登入");

  const book = {
    id: Date.now(),
    uid: currentUser.uid,
    title: title.value,
    author: author.value,
    tags: tags.value,
    status: status.value,
    rating: rating.value,
    note: note.value
  };

  await db.collection("books").doc(String(book.id)).set(book);

  loadBooks();
}

/* ---------- 刪除 ---------- */
async function del(id){
  await db.collection("books").doc(String(id)).delete();
  loadBooks();
}

/* ---------- 顯示 ---------- */
function render(){
  const q = search.value?.toLowerCase() || "";
  const list = document.getElementById("list");
  list.innerHTML = "";

  books
    .filter(b =>
      (b.title || "").toLowerCase().includes(q) ||
      (b.tags || "").toLowerCase().includes(q) ||
      (b.author || "").toLowerCase().includes(q)
    )
    .forEach(b => {
      list.innerHTML += `
      <div class="card">
        <b>${b.title}</b> (${b.status})<br>
        <div class="small">${b.author || ""}</div>
        <div>⭐ ${b.rating || "-"}</div>
        <div>
          ${b.tags ? b.tags.split(",").map(t => `<span class="tag">${t}</span>`).join("") : ""}
        </div>
        <p>${b.note || ""}</p>
        <button onclick="del(${b.id})">刪除</button>
      </div>
      `;
    });
}

render();
</script>

</body>
</html>
